<h2>Spectral glyph — elegant endpoint (palette-mapped)</h2>
<p class="subtitle">Smooth low-frequency field driven through a curated multi-stop palette.
Cohesive, gradient, no seal/frame/text — and still fully load-bearing (the field IS the data).
Same artist = same palette + visual family; each track is a distinct bloom.</p>
